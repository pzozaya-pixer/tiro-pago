services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
