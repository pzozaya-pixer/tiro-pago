services:
  postgres:
    image: postgres:16-alpine
    container_name: tiro22-postgres-pago
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tiro22pago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiro22pago}
      POSTGRES_DB: ${POSTGRES_DB:-tiro22pago}
    volumes:
      - pgdata-pago:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tiro22-api-pago
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tiro22pago}:${POSTGRES_PASSWORD:-tiro22pago}@postgres:5432/${POSTGRES_DB:-tiro22pago}?schema=public
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_DATA_PROVIDER=${VITE_DATA_PROVIDER:-api}
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: tiro22-web-pago
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata-pago:
