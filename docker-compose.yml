services:
  postgres:
    image: postgres:16-alpine
    container_name: tiro22-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tiro22}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiro22}
      POSTGRES_DB: ${POSTGRES_DB:-tiro22}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tiro22-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tiro22}:${POSTGRES_PASSWORD:-tiro22}@postgres:5432/${POSTGRES_DB:-tiro22}?schema=public
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_DATA_PROVIDER=${VITE_DATA_PROVIDER:-api}
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: tiro22-web
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
