services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tiro22:tiro22@postgres:5432/tiro22}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiro22
      POSTGRES_USER: tiro22
      POSTGRES_PASSWORD: tiro22
    volumes:
      - tiro22-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiro22 -d tiro22"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  tiro22-postgres:
